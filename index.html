<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="robots" content="noindex, nofollow" />
  <title>For Taara 🌙</title>
  <meta name="description" content="A little universe, built for you." />

  <link rel="stylesheet" href="assets/css/01-variables.css" />
  <link rel="stylesheet" href="assets/css/02-base.css" />
  <link rel="stylesheet" href="assets/css/03-story.css" />
  <link rel="stylesheet" href="assets/css/04-hr.css" />
  <link rel="stylesheet" href="assets/css/05-transitions.css" />
  <link rel="stylesheet" href="assets/css/06-media.css" />
</head>

<body class="story-mode">

  <!-- Backgrounds -->
  <div id="sky" aria-hidden="true"></div>
  <div id="moon" aria-hidden="true"></div>
  <div id="journey-star" aria-hidden="true"></div>
  <div id="rain" aria-hidden="true"></div>

  <!-- Persistent chrome -->
  <div id="progress" aria-hidden="true"></div>
  <button id="back-btn" type="button" aria-label="Go back">‹</button>
  <button id="music-toggle" type="button">🔈</button>

  <!-- Transition overlays -->
  <div id="glitch" aria-hidden="true"><div class="scanlines"></div></div>
  <div id="powerdown" aria-hidden="true"></div>

  <!-- ====================== PART I — THE LOVE STORY 🌙 ====================== -->
  <section id="access"        class="screen"><div class="screen__inner" id="access-inner"></div></section>
  <section id="welcome"       class="screen"><div class="screen__inner" id="welcome-inner"></div></section>
  <section id="before-us"     class="screen"><div class="screen__inner" id="before-us-inner"></div></section>
  <section id="when-i-knew"   class="screen"><div class="screen__inner" id="when-i-knew-inner"></div></section>
  <section id="little-things" class="screen"><div class="screen__inner" id="little-things-inner"></div></section>
  <section id="the-storm"     class="screen"><div class="screen__inner" id="the-storm-inner"></div></section>
  <section id="bubu-dudu"     class="screen"><div class="screen__inner" id="bubu-dudu-inner"></div></section>
  <section id="future"        class="screen"><div class="screen__inner" id="future-inner"></div></section>

  <!-- ====================== PART II — THE HR PORTAL 💼 ===================== -->
  <section id="hr-transition" class="screen"><div class="screen__inner" id="hr-transition-inner"></div></section>
  <section id="resume"        class="screen"><div class="screen__inner" id="resume-inner"></div></section>
  <section id="verification"  class="screen"><div class="screen__inner" id="verification-inner"></div></section>
  <section id="stress-test"   class="screen"><div class="screen__inner" id="stress-test-inner"></div></section>
  <section id="culture-fit"   class="screen"><div class="screen__inner" id="culture-fit-inner"></div></section>
  <section id="references"    class="screen"><div class="screen__inner" id="references-inner"></div></section>
  <section id="compensation"  class="screen"><div class="screen__inner" id="compensation-inner"></div></section>
  <section id="offer-letter"  class="screen"><div class="screen__inner" id="offer-letter-inner"></div></section>

  <!-- ====================== THE MOMENT 💍 & KEEPSAKE 🏠 ==================== -->
  <section id="final-proposal" class="screen"><div class="screen__inner" id="final-proposal-inner"></div></section>
  <section id="keepsake-home"  class="screen"><div class="screen__inner" id="keepsake-home-inner"></div></section>

  <!-- Scripts: content first, main last -->
  <script src="assets/js/content.js"></script>
  <script src="assets/js/navigation.js"></script>
  <script src="assets/js/audio.js"></script>
  <script src="assets/js/access.js"></script>
  <script src="assets/js/transitions.js"></script>
  <script src="assets/js/media.js"></script>
  <script src="assets/js/story.js"></script>
  <script src="assets/js/hr-portal.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
